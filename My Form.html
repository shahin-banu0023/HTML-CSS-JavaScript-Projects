<!DOCTYPE html>
<html lang="en">
<head>
	<title>My First Form</title>
	<h1>Registration Form</h1>
</head>
<body>
	<h3>Personal Information</h3>
	<p>Name: <input type="text"></p>
	<p>Password: <input type="password"></p>
	<p>Age: <input type="text"></p>
	<p>Date of Birth: <input type="text"placeholder="dd-mm-yyyy"></p>
	<p>Gender: <input type="radio"value="Male"name="gender">Male
	<input type="radio"value="Female"name="gender">Female
	<input type="radio"value="Other"name="gender">Other
	</p>
	<p>Hobbies:<input type="checkbox"value="Reading"name="Hobbies">Reading
	<input type="checkbox"value="Travelling"name="Hobbies">Travelling
	<input type="checkbox"value="sports"name="Sports">Sports
	</p>
	<p>Country:<select name="country">
			<option value="India">India</option>
			<option value="America">America</option>
			<option value="china">China</option>
				</select>
	</p>
	<p>Additional Information:<textarea name="Info"placeholder="Enter additional information"></textarea>
	</p>
	<input type="submit"value="submit">
	<input type="submit"value="Reset">
</body>
</html>
